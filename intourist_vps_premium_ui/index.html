<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intourist VPS — Premium UI</title>
  <link rel="stylesheet" href="style.css" />
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="window-bar">
      <div class="window-name"><span class="mini-logo"></span>Intourist VPS</div>
      <div class="window-controls"><span></span><span></span><span></span></div>
    </div>

    <main class="app">
      <section class="hero-card">
        <div class="brand-side">
          <img class="logo" src="images/logo.png" alt="">
          <div>
            <h1>Intourist VPS</h1>
            <p>Быстрое подключение · 10+ стран на выбор</p>
            <div class="country-strip" id="countryStrip"></div>
          </div>
        </div>

        <div class="status-card" id="statusCard">
          <div class="pulse"></div>
          <div>
            <span>Статус</span>
            <strong id="statusText">отключено</strong>
          </div>
        </div>
      </section>

      <section class="grid">
        <aside class="left">
          <div class="key-card">
            <div class="section-title">Ключ доступа / подписка</div>
            <div class="key-input">
              <img src="images/link.svg" alt="">
              <input id="keyInput" placeholder="Вставьте ссылку-подписку или vless:// vmess:// ss:// trojan://" />
              <button id="copyBtn"><img src="images/copy.svg" alt=""></button>
            </div>
            <div class="link-history" id="linkHistory"></div>
          </div>

          <div class="server-card">
            <div class="server-head">
              <div>
                <div class="section-title">Серверы</div>
                <p id="modeText">Выберите страну и протокол подключения</p>
              </div>
              <div class="head-actions">
                <button class="refresh ping" id="pingBtn" title="Проверить пинг всех серверов сейчас">Пинг</button>
                <button class="refresh" id="refreshBtn">Обновить</button>
              </div>
            </div>

            <div class="servers" id="serversList">
              <!-- строки серверов рендерятся из Python через bridge.serversUpdated -->
            </div>
          </div>

          <div class="action-row">
            <button class="action connect" id="connectBtn"><span><img src="images/bolt.svg" alt=""></span><b>Подключиться</b><i>›</i></button>
            <button class="action disconnect" id="disconnectBtn"><span><img src="images/power.svg" alt=""></span><b>Отключиться</b><i>›</i></button>
          </div>
        </aside>

        <aside class="right">
          <a class="side-card tg" href="https://t.me/blokirovki_ru" target="_blank" rel="noopener" id="tgLink">
            <div class="round"><img src="images/telegram.svg" alt=""></div>
            <div>
              <b>ТГ-канал</b>
              <strong>Блокировки России</strong>
            </div>
            <i>›</i>
          </a>

          <div class="metrics" id="metrics">
            <div><span>Время</span><b id="mTime">00:00:00</b></div>
            <div><span>Получено</span><b id="mDown">—</b></div>
            <div><span>Отправлено</span><b id="mUp">—</b></div>
            <div><span>DNS</span><b id="mDns">—</b></div>
          </div>

          <div class="mini-panel">
            <div class="section-title">Профиль</div>
            <p id="profileText">Нет активного подключения</p>
          </div>
        </aside>
      </section>

      <section class="log-card">
        <div class="log-head">
          <div class="section-title">Лог соединения</div>
          <span>live</span>
        </div>
        <div class="terminal" id="terminal"></div>
      </section>
    </main>
  </div>

  <script>
    let bridge = null;
    let servers = [];
    let selectedIndex = 0;

    // Windows не рисует flag-эмодзи как флаги (показывает буквы кода
    // страны) — поэтому рисуем флаги сами простыми SVG.
    const FLAG_SVG = {
      ru: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#fff"/><rect y="6.67" width="30" height="6.67" fill="#0039a6"/><rect y="13.33" width="30" height="6.67" fill="#d52b1e"/></svg>',
      nl: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#fff"/><rect width="30" height="6.67" fill="#ae1c28"/><rect y="13.33" width="30" height="6.67" fill="#21468b"/></svg>',
      bg: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#fff"/><rect y="6.67" width="30" height="6.67" fill="#00966e"/><rect y="13.33" width="30" height="6.67" fill="#d62612"/></svg>',
      de: '<svg viewBox="0 0 30 20"><rect width="30" height="6.67" fill="#000"/><rect y="6.67" width="30" height="6.67" fill="#dd0000"/><rect y="13.33" width="30" height="6.67" fill="#ffce00"/></svg>',
      pl: '<svg viewBox="0 0 30 20"><rect width="30" height="10" fill="#fff"/><rect y="10" width="30" height="10" fill="#dc143c"/></svg>',
      jp: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#fff"/><circle cx="15" cy="10" r="5.5" fill="#bc002d"/></svg>',
      us: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#b22234"/><g fill="#fff"><rect y="1.54" width="30" height="1.54"/><rect y="4.62" width="30" height="1.54"/><rect y="7.69" width="30" height="1.54"/><rect y="10.77" width="30" height="1.54"/><rect y="13.85" width="30" height="1.54"/><rect y="16.92" width="30" height="1.54"/></g><rect width="12" height="10.67" fill="#3c3b6b"/></svg>',
      gb: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#012169"/><path d="M0 0L30 20M30 0L0 20" stroke="#fff" stroke-width="3"/><path d="M0 0L30 20M30 0L0 20" stroke="#c8102e" stroke-width="1.5"/><path d="M15 0v20M0 10h30" stroke="#fff" stroke-width="1.2"/><path d="M15 0v20M0 10h30" stroke="#c8102e" stroke-width="0.8"/></svg>',
      fr: '<svg viewBox="0 0 30 20"><rect width="10" height="20" fill="#0055a4"/><rect x="10" width="10" height="20" fill="#fff"/><rect x="20" width="10" height="20" fill="#ef4135"/></svg>',
      es: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#aa151b"/><rect y="5" width="30" height="10" fill="#f1bf00"/></svg>',
      fi: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#fff"/><rect x="9" width="4" height="20" fill="#002f6c"/><rect y="8" width="30" height="4" fill="#002f6c"/></svg>',
      se: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#006aa7"/><rect x="9" width="4" height="20" fill="#fecc00"/><rect y="8" width="30" height="4" fill="#fecc00"/></svg>',
      tr: '<svg viewBox="0 0 30 20"><rect width="30" height="20" fill="#e30a17"/><circle cx="12" cy="10" r="5" fill="#fff"/><circle cx="13.5" cy="10" r="4" fill="#e30a17"/></svg>',
      ir: '<svg viewBox="0 0 30 20"><rect width="30" height="6.67" fill="#239f40"/><rect y="6.67" width="30" height="6.67" fill="#fff"/><rect y="13.33" width="30" height="6.67" fill="#da0000"/></svg>',
      ua: '<svg viewBox="0 0 30 20"><rect width="30" height="10" fill="#005bbb"/><rect y="10" width="30" height="10" fill="#ffd500"/></svg>',
      sg: '<svg viewBox="0 0 30 20"><rect width="30" height="10" fill="#ed2939"/><rect y="10" width="30" height="10" fill="#fff"/></svg>',
    };
    const DEFAULT_FLAG = '<svg viewBox="0 0 30 20"><rect width="30" height="20" rx="3" fill="#233443"/><circle cx="15" cy="10" r="6" fill="none" stroke="#8ea0b3" stroke-width="1.4"/><path d="M9 14 L 15 18 L 21 10" fill="none" stroke="#8ea0b3" stroke-width="1.2"/></svg>';

    function flagFor(code) {
      if (!code) return DEFAULT_FLAG;
      return FLAG_SVG[code.toLowerCase()] || DEFAULT_FLAG;
    }

    function renderCountryStrip() {
      const strip = document.getElementById('countryStrip');
      const order = ['ru', 'nl', 'bg', 'de', 'pl', 'jp', 'us', 'gb', 'fr', 'es'];
      strip.innerHTML = order.map(c => `<span class="flag-chip">${flagFor(c)}</span>`).join('');
    }

    function renderServers() {
      const list = document.getElementById('serversList');
      list.innerHTML = '';
      servers.forEach((srv, idx) => {
        const row = document.createElement('div');
        row.className = 'server-row' + (idx === selectedIndex ? ' active' : '');
        const isHelper = srv.kind === 'helper';
        const pingText = isHelper ? '—' : (srv.ping === null || srv.ping === undefined ? '...' : (srv.ping < 0 ? 'недост.' : srv.ping + ' ms'));
        row.innerHTML = `
          <span class="flag">${flagFor(srv.country)}</span>
          <div><b>${srv.name || ''}</b><small>${srv.location || (isHelper ? 'Локальный режим' : '')}</small></div>
          <em>${srv.transport || ''}</em>
          <i class="signal"><u></u><u></u><u></u><u></u></i>
          <strong>${pingText}</strong>
        `;
        // Один клик — просто выделить сервер.
        row.addEventListener('click', () => {
          selectedIndex = idx;
          if (bridge) bridge.selectServer(idx);
          renderServers();
        });
        // Двойной клик — сразу переключиться/подключиться к этому серверу.
        row.addEventListener('dblclick', () => {
          selectedIndex = idx;
          if (bridge) {
            bridge.selectServer(idx);
            bridge.connectSelected();
          }
          renderServers();
        });
        list.appendChild(row);
      });
    }

    function renderLinkHistory(links) {
      const wrap = document.getElementById('linkHistory');
      if (!links || !links.length) { wrap.innerHTML = ''; return; }
      const esc = (s) => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      wrap.innerHTML = '<div class="link-history-title">Недавние ссылки</div>' +
        links.map((l) => `<div class="hist-item" title="${esc(l)}"><span>${esc(l)}</span><i>↺</i></div>`).join('');
      Array.from(wrap.querySelectorAll('.hist-item')).forEach((el, i) => {
        el.addEventListener('click', () => {
          document.getElementById('keyInput').value = links[i];
          triggerLoadSubscription();
        });
      });
    }

    function appendLog(message) {
      const terminal = document.getElementById('terminal');
      const time = new Date().toLocaleTimeString('ru-RU');
      const p = document.createElement('p');
      const safe = message.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      p.innerHTML = `<time>[${time}]</time> ${safe}`;
      terminal.appendChild(p);
      while (terminal.children.length > 200) {
        terminal.removeChild(terminal.firstChild);
      }
      terminal.scrollTop = terminal.scrollHeight;
    }

    function setStatus(connected) {
      const card = document.getElementById('statusCard');
      const text = document.getElementById('statusText');
      card.classList.toggle('is-online', connected);
      text.textContent = connected ? 'подключено' : 'отключено';
      document.getElementById('connectBtn').disabled = connected;
      document.getElementById('disconnectBtn').disabled = !connected;
    }

    function triggerLoadSubscription() {
      const val = document.getElementById('keyInput').value.trim();
      if (val && bridge) bridge.loadSubscription(val);
    }

    function initBridge() {
      new QWebChannel(qt.webChannelTransport, (channel) => {
        bridge = channel.objects.bridge;

        bridge.logMessage.connect(appendLog);
        bridge.statusChanged.connect(setStatus);
        bridge.modeChanged.connect((text) => {
          document.getElementById('modeText').textContent = text || 'Выберите страну и протокол подключения';
          document.getElementById('profileText').textContent = text || 'Нет активного подключения';
        });
        bridge.metricsUpdated.connect((json) => {
          try {
            const m = JSON.parse(json);
            document.getElementById('mTime').textContent = m.time || '00:00:00';
            document.getElementById('mDown').textContent = m.downloaded || '—';
            document.getElementById('mUp').textContent = m.uploaded || '—';
            document.getElementById('mDns').textContent = m.dns || '—';
          } catch (e) {}
        });
        bridge.serversUpdated.connect((json) => {
          try {
            servers = JSON.parse(json);
            if (selectedIndex >= servers.length) selectedIndex = 0;
            renderServers();
          } catch (e) {}
        });
        bridge.linkHistoryUpdated.connect((json) => {
          try { renderLinkHistory(JSON.parse(json)); } catch (e) {}
        });

        setStatus(false);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCountryStrip();
      initBridge();

      document.getElementById('connectBtn').addEventListener('click', () => {
        if (bridge) bridge.connectSelected();
      });
      document.getElementById('disconnectBtn').addEventListener('click', () => {
        if (bridge) bridge.disconnectVpn();
      });
      document.getElementById('refreshBtn').addEventListener('click', triggerLoadSubscription);
      document.getElementById('pingBtn').addEventListener('click', () => {
        if (bridge) bridge.pingServers();
      });
      document.getElementById('keyInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') triggerLoadSubscription();
      });
      // Автоматически подгружаем список серверов сразу после вставки ссылки.
      document.getElementById('keyInput').addEventListener('paste', () => {
        setTimeout(triggerLoadSubscription, 50);
      });
      document.getElementById('copyBtn').addEventListener('click', () => {
        const input = document.getElementById('keyInput');
        if (input.value) navigator.clipboard.writeText(input.value);
      });
      document.getElementById('tgLink').addEventListener('click', (e) => {
        e.preventDefault();
        if (bridge) bridge.openUrl('https://t.me/blokirovki_ru');
      });
    });
  </script>
</body>
</html>
